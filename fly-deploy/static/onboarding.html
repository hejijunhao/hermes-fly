<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HERMES // SETUP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:    #06060b;
      --bg:         #0a0a0f;
      --bg-panel:   #0e0e16;
      --bg-surface: #12121e;
      --red:        #e63946;
      --red-dim:    #8b1a22;
      --red-glow:   rgba(230, 57, 70, 0.15);
      --blue:       #00b4d8;
      --blue-dim:   #005f73;
      --green:      #06d6a0;
      --green-dim:  #048a65;
      --amber:      #f4a261;
      --text:       #c5c8d4;
      --text-dim:   #5a5d6e;
      --text-faint: #33354a;
      --border-hard:#1e1e34;
      --font-mono:  'IBM Plex Mono', 'Consolas', monospace;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 900;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 901;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
    }

    .setup-frame {
      position: relative;
      width: 480px;
      border: 1px solid var(--border-hard);
      background: var(--bg);
    }

    /* Corner accents */
    .setup-frame::before, .setup-frame::after {
      content: ''; position: absolute; width: 12px; height: 12px;
    }
    .setup-frame::before { top: -1px; left: -1px; border-top: 2px solid var(--blue-dim); border-left: 2px solid var(--blue-dim); }
    .setup-frame::after  { top: -1px; right: -1px; border-top: 2px solid var(--blue-dim); border-right: 2px solid var(--blue-dim); }
    .corner-bl, .corner-br { position: absolute; width: 12px; height: 12px; }
    .corner-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--blue-dim); border-left: 2px solid var(--blue-dim); }
    .corner-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--blue-dim); border-right: 2px solid var(--blue-dim); }

    /* Header */
    .setup-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-hard);
      display: flex; align-items: center; gap: 8px;
    }
    .setup-header .logo { color: var(--red); font-weight: 700; font-size: 16px; letter-spacing: 3px; text-shadow: 0 0 10px var(--red-glow); }
    .setup-header .divider { color: var(--text-faint); }
    .setup-header .subtitle { color: var(--blue); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 8px rgba(0, 180, 216, 0.3); }

    /* Body */
    .setup-body { padding: 24px 20px; }

    .setup-intro {
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .field-label {
      display: block; font-size: 9px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .setup-input {
      width: 100%; padding: 10px 40px 10px 12px;
      background: var(--bg-panel); border: 1px solid var(--border-hard);
      color: var(--text); font-family: var(--font-mono); font-size: 13px;
      outline: none; transition: border-color 0.2s;
    }
    .setup-input:focus { border-color: var(--blue-dim); box-shadow: 0 0 0 1px var(--blue-dim); }
    .setup-input::placeholder { color: var(--text-faint); }

    .toggle-vis {
      position: absolute; right: 8px;
      background: none; border: none; color: var(--text-faint);
      font-family: var(--font-mono); font-size: 11px;
      cursor: pointer; padding: 4px; letter-spacing: 1px;
      transition: color 0.2s;
    }
    .toggle-vis:hover { color: var(--text-dim); }

    /* Buttons */
    .btn-row {
      display: flex; gap: 8px; margin-top: 20px;
    }

    .btn-primary {
      flex: 1; padding: 10px;
      background: var(--blue-dim); border: 1px solid var(--blue-dim);
      color: var(--text); font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-primary:hover { background: var(--blue); border-color: var(--blue); }
    .btn-primary:disabled { opacity: 0.4; cursor: default; }

    .btn-skip {
      padding: 10px 16px;
      background: transparent; border: 1px solid var(--border-hard);
      color: var(--text-dim); font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-skip:hover { border-color: var(--text-dim); color: var(--text); }

    /* Status messages */
    .msg {
      margin-top: 12px; padding: 8px 12px;
      font-size: 11px; line-height: 1.5;
      display: none;
    }
    .msg.visible { display: block; }
    .msg-error {
      background: rgba(230, 57, 70, 0.08);
      border-left: 2px solid var(--red);
      color: var(--red);
    }
    .msg-ok {
      background: rgba(6, 214, 160, 0.08);
      border-left: 2px solid var(--green);
      color: var(--green);
    }

    /* Help link */
    .setup-help {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--border-hard);
      font-size: 11px; color: var(--text-faint); line-height: 1.6;
    }
    .setup-help a {
      color: var(--blue); text-decoration: none;
      transition: color 0.2s;
    }
    .setup-help a:hover { color: var(--text); }

    /* Footer */
    .setup-footer {
      padding: 12px 20px; border-top: 1px solid var(--border-hard);
      font-size: 9px; color: var(--text-faint); letter-spacing: 1px;
      text-transform: uppercase; text-align: center;
    }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--text-faint); border-top-color: var(--blue);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
  </style>
</head>
<body>
  <div class="setup-frame">
    <div class="corner-bl"></div>
    <div class="corner-br"></div>

    <div class="setup-header">
      <span class="logo">HERMES</span>
      <span class="divider">//</span>
      <span class="subtitle">First-Run Setup</span>
    </div>

    <div class="setup-body">
      <p class="setup-intro">
        Enter your OpenRouter API key to connect Hermes to an LLM provider.
        Your key is stored on this instance only.
      </p>

      <label class="field-label" for="api-key">OpenRouter API Key</label>
      <div class="input-wrap">
        <input
          class="setup-input"
          type="password"
          id="api-key"
          placeholder="sk-or-v1-..."
          autocomplete="off"
          spellcheck="false"
          autofocus
        >
        <button class="toggle-vis" id="toggle-vis" type="button">SHOW</button>
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="btn-launch">Launch Hermes</button>
        <button class="btn-skip" id="btn-skip">Skip</button>
      </div>

      <div class="msg msg-error" id="msg-error"></div>
      <div class="msg msg-ok" id="msg-ok"><span class="spinner"></span>Validating key...</div>

      <div class="setup-help">
        Don't have a key? Get one at
        <a href="https://openrouter.ai/keys" target="_blank" rel="noopener">openrouter.ai/keys</a>
      </div>
    </div>

    <div class="setup-footer">Hermes Agent // Fly.io Deployment</div>
  </div>

  <script>
    const input     = document.getElementById('api-key');
    const btnLaunch = document.getElementById('btn-launch');
    const btnSkip   = document.getElementById('btn-skip');
    const toggleVis = document.getElementById('toggle-vis');
    const msgError  = document.getElementById('msg-error');
    const msgOk     = document.getElementById('msg-ok');

    // Show/hide password toggle
    toggleVis.addEventListener('click', () => {
      const showing = input.type === 'text';
      input.type = showing ? 'password' : 'text';
      toggleVis.textContent = showing ? 'SHOW' : 'HIDE';
    });

    function clearMessages() {
      msgError.classList.remove('visible');
      msgOk.classList.remove('visible');
    }

    function showError(text) {
      clearMessages();
      msgError.textContent = text;
      msgError.classList.add('visible');
    }

    function setLoading(loading) {
      btnLaunch.disabled = loading;
      btnSkip.disabled = loading;
      input.disabled = loading;
      if (loading) {
        clearMessages();
        msgOk.innerHTML = '<span class="spinner"></span>Validating key...';
        msgOk.classList.add('visible');
      }
    }

    // Submit
    btnLaunch.addEventListener('click', async () => {
      const key = input.value.trim();

      if (!key) {
        showError('API key is required');
        input.focus();
        return;
      }

      if (!key.startsWith('sk-or-')) {
        showError('Key should start with sk-or- (OpenRouter format)');
        input.focus();
        return;
      }

      setLoading(true);

      try {
        const resp = await fetch('/onboarding', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: key }),
        });

        const data = await resp.json();

        if (resp.ok && data.ok) {
          msgOk.innerHTML = 'Key saved — launching terminal...';
          setTimeout(() => { window.location.href = '/terminal'; }, 600);
        } else {
          setLoading(false);
          showError(data.error || 'Something went wrong');
        }
      } catch (err) {
        setLoading(false);
        showError('Network error — could not reach server');
      }
    });

    // Enter key submits
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btnLaunch.click();
    });

    // Skip goes straight to terminal
    btnSkip.addEventListener('click', () => {
      window.location.href = '/terminal';
    });
  </script>
</body>
</html>
